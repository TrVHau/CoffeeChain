# CoffeeChain — Docker Compose
# [Unit-3] BE-Member-3
#
# Services:
#   Hyperledger Fabric 2.5 (orderer, peer0.org1, peer0.org2)
#   CouchDB 3.3 (state DB for each peer)
#   Fabric CA 1.5 (one per org)
#   PostgreSQL 15 (backend read-model)
#   IPFS Kubo (evidence storage)
#   Backend Spring Boot
#   Frontend Next.js
#
# Bring up: ./scripts/setup-network.sh
# Tear down: docker compose down -v

version: '3.8'

networks:
  default:
    name: coffee_network

volumes:
  postgres-data:
  ipfs-data:
  orderer-data:
  peer0-org1-data:
  peer0-org2-data:

services:

  # ── Orderer ──────────────────────────────────────────────────────────────
  orderer.example.com:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.example.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/genesis.block
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    volumes:
      - ${ARTIFACTS_BASE:-./channel-artifacts}/genesis.block:/var/hyperledger/orderer/genesis.block
      - ${CRYPTO_BASE:-./crypto-config}/ordererOrganizations/example.com/orderers/orderer.example.com/msp:/var/hyperledger/orderer/msp
      - ${CRYPTO_BASE:-./crypto-config}/ordererOrganizations/example.com/orderers/orderer.example.com/tls:/var/hyperledger/orderer/tls
      - orderer-data:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"

  # ── CouchDB for Org1 ─────────────────────────────────────────────────────
  couchdb0:
    image: couchdb:3.3
    container_name: couchdb0
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"

  # ── Peer0 Org1 ───────────────────────────────────────────────────────────
  peer0.org1.example.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.org1.example.com
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=coffee_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.org1.example.com
      - CORE_PEER_ADDRESS=peer0.org1.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.example.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ${CRYPTO_BASE:-./crypto-config}/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/msp:/etc/hyperledger/fabric/msp
      - ${CRYPTO_BASE:-./crypto-config}/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls:/etc/hyperledger/fabric/tls
      - ${CRYPTO_BASE:-./crypto-config}/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp:/etc/hyperledger/fabric/admin-msp
      - ${ARTIFACTS_BASE:-./channel-artifacts}:/channel-artifacts
      - peer0-org1-data:/var/hyperledger/production
    ports:
      - "7051:7051"
    depends_on:
      - couchdb0
      - orderer.example.com

  # ── CouchDB for Org2 ─────────────────────────────────────────────────────
  couchdb1:
    image: couchdb:3.3
    container_name: couchdb1
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"

  # ── Peer0 Org2 ───────────────────────────────────────────────────────────
  peer0.org2.example.com:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.org2.example.com
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=coffee_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.org2.example.com
      - CORE_PEER_ADDRESS=peer0.org2.example.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org2.example.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org2.example.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org2.example.com:9051
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ${CRYPTO_BASE:-./crypto-config}/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/msp:/etc/hyperledger/fabric/msp
      - ${CRYPTO_BASE:-./crypto-config}/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls:/etc/hyperledger/fabric/tls
      - ${CRYPTO_BASE:-./crypto-config}/peerOrganizations/org2.example.com/users/Admin@org2.example.com/msp:/etc/hyperledger/fabric/admin-msp
      - ${ARTIFACTS_BASE:-./channel-artifacts}:/channel-artifacts
      - peer0-org2-data:/var/hyperledger/production
    ports:
      - "9051:9051"
    depends_on:
      - couchdb1
      - orderer.example.com

  # ── Fabric CA Org1 ───────────────────────────────────────────────────────
  ca.org1.example.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.org1.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      # Force TLS cert SAN to include the service hostname (not just the container ID)
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.org1.example.com,localhost,127.0.0.1
    volumes:
      - ${CRYPTO_BASE:-./crypto-config}/peerOrganizations/org1.example.com/ca:/etc/hyperledger/fabric-ca-server
    ports:
      - "7054:7054"

  # ── Fabric CA Org2 ───────────────────────────────────────────────────────
  ca.org2.example.com:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.org2.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org2
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      # Force TLS cert SAN to include the service hostname (not just the container ID)
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.org2.example.com,localhost,127.0.0.1
    volumes:
      - ${CRYPTO_BASE:-./crypto-config}/peerOrganizations/org2.example.com/ca:/etc/hyperledger/fabric-ca-server
    ports:
      - "8054:7054"

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_DB=coffeetrace
      - POSTGRES_USER=coffeetrace
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffeetrace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── IPFS Kubo ────────────────────────────────────────────────────────────
  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs
    volumes:
      - ipfs-data:/data/ipfs
    ports:
      - "5001:5001"   # API
      - "8081:8080"   # Gateway
    environment:
      - IPFS_PROFILE=server

  # ── Backend Spring Boot ──────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/coffeetrace
      - SPRING_DATASOURCE_USERNAME=coffeetrace
      - DB_PASSWORD=secret
      - FABRIC_CHANNEL_NAME=coffee-traceability-channel
      - FABRIC_CHAINCODE_NAME=CoffeeTraceChaincode
      - FABRIC_ORG1_PEER_ENDPOINT=peer0.org1.example.com:7051
      - FABRIC_ORG2_PEER_ENDPOINT=peer0.org2.example.com:9051
      - FABRIC_ORG1_MSP_ID=Org1MSP
      - FABRIC_ORG2_MSP_ID=Org2MSP
      - FABRIC_ORG1_TLS_CERT_PATH=/crypto/peerOrganizations/org1.example.com/tlsca/tlsca.org1.example.com-cert.pem
      - FABRIC_ORG2_TLS_CERT_PATH=/crypto/peerOrganizations/org2.example.com/tlsca/tlsca.org2.example.com-cert.pem
      - FABRIC_ORG1_ADMIN_CERT_PATH=/crypto/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp/signcerts/cert.pem
      - FABRIC_ORG1_ADMIN_KEY_PATH=/crypto/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp/keystore/
      - FABRIC_ORG2_ADMIN_CERT_PATH=/crypto/peerOrganizations/org2.example.com/users/Admin@org2.example.com/msp/signcerts/cert.pem
      - FABRIC_ORG2_ADMIN_KEY_PATH=/crypto/peerOrganizations/org2.example.com/users/Admin@org2.example.com/msp/keystore/
      - FABRIC_ORG1_USERS_BASE_PATH=/crypto/peerOrganizations/org1.example.com/users
      - FABRIC_ORG2_USERS_BASE_PATH=/crypto/peerOrganizations/org2.example.com/users
      - IPFS_API_URL=http://ipfs:5001
      - TRACE_PUBLIC_BASE_URL=http://localhost:3000/trace/
      - JWT_SECRET=${JWT_SECRET:-coffee-chain-demo-secret-key-at-least-32-chars!!}
    volumes:
      - ${CRYPTO_BASE:-./crypto-config}:/crypto
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      peer0.org1.example.com:
        condition: service_started
      peer0.org2.example.com:
        condition: service_started
      ipfs:
        condition: service_started

  # ── Frontend Next.js ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
